services:
  pnt-postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: pnt
      POSTGRES_PASSWORD: pnt
      POSTGRES_DB: pnt_mes
    ports:
      - "5432:5432"
    volumes:
      - pnt-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pnt -d pnt_mes"]
      interval: 5s
      timeout: 5s
      retries: 10

  pnt-redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  pnt-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - LOG_LEVEL=debug
      - POSTGRES_HOST=pnt-postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=pnt_mes
      - POSTGRES_USER=pnt
      - POSTGRES_PASSWORD=pnt
      - REDIS_HOST=pnt-redis
      - REDIS_PORT=6379
    env_file:
      - .env
    depends_on:
      pnt-postgres:
        condition: service_healthy
      pnt-redis:
        condition: service_healthy

  pnt-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - BACKEND_URL=http://pnt-backend:8000
      - VITE_API_URL=http://localhost:8000/api
      - VITE_WS_URL=ws://localhost:8000
    depends_on:
      - pnt-backend

volumes:
  pnt-pgdata:
